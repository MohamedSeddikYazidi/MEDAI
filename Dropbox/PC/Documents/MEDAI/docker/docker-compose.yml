# MedAI - Docker Compose
# Full-stack deployment configuration

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: medai-postgres
    environment:
      POSTGRES_DB: medai_db
      POSTGRES_USER: medai
      POSTGRES_PASSWORD: medai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - medai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: medai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - medai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Backend API ====================
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: medai-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://medai:medai_password@postgres:5432/medai_db
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_PERSIST_DIR=/app/data/chromadb
      - LLM_PROVIDER=groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama-3.3-70b-versatile
      - OLLAMA_BASE_URL=http://ollama:11434
      - ANONYMIZED_TELEMETRY=False
      - TRAINING_SAMPLE_SIZE=20000
    volumes:
      - backend_data:/app/data
      - model_data:/app/models/saved_models
      - ../datasets:/app/datasets 
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - medai-network

  # ==================== Frontend ====================
  frontend:
    image: node:20-alpine
    container_name: medai-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    command: sh -c "npm install --legacy-peer-deps && echo 'module.exports={plugins:{tailwindcss:{},autoprefixer:{}}}' > /app/postcss.config.js && npm run dev"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - medai-network

  # ==================== ChromaDB ====================
  chromadb:
    image: chromadb/chroma:latest
    container_name: medai-chromadb
    ports:
      - "8001:8000"
    environment:
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - medai-network

volumes:
  postgres_data:
  redis_data:
  backend_data:
  model_data:
  chroma_data:
  frontend_node_modules:

networks:
  medai-network:
    driver: bridge
